name: Build addon

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to upload the archive to, for example v1.0.0"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build free@home addon
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build addon archive
        run: npm run pack

      - name: Upload addon archive
        uses: actions/upload-artifact@v4
        with:
          name: freeathome-esphome-coffee-addon
          path: "*.tar"
          if-no-files-found: error

      - name: Determine release tag
        id: release
        shell: bash
        env:
          MANUAL_TAG: ${{ inputs.tag }}
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${MANUAL_TAG}" ]]; then
            echo "tag=${MANUAL_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload addon archive to release
        if: steps.release.outputs.tag != ''
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          if ! gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release create "${RELEASE_TAG}" --verify-tag --generate-notes
          fi

          gh release upload "${RELEASE_TAG}" *.tar --clobber
